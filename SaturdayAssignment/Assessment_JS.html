<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .container {
            width: 350px;
            margin: 100px auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        /* GRID for buttons */
        .buttons {
            margin-top: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 10px;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .add { background-color: blue; }
        .sub { background-color: green; }
        .mul { background-color: orange; }
        .div { background-color: red; }

        button:hover {
            opacity: 0.8;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Simple Calculator</h2>

    <label>First Number</label>
    <input type="number" id="num1">

    <label>Second Number</label>
    <input type="number" id="num2">

    <div class="buttons">
        <button class="add" onclick="add()">Add</button>
        <button class="sub" onclick="subtract()">Subtract</button>
        <button class="mul" onclick="multiply()">Multiply</button>
        <button class="div" onclick="divide()">Division</button>
    </div>

    <p id="result">Calculated Result:</p>
</div>

<script>
    function getValues() {
        let a = parseFloat(document.getElementById("num1").value);
        let b = parseFloat(document.getElementById("num2").value);
        return { a, b };
    }

    function add() {
        let { a, b } = getValues();
        document.getElementById("result").innerText = `${a} + ${b} = ${a + b}`;
    }

    function subtract() {
        let { a, b } = getValues();
        document.getElementById("result").innerText = `${a} - ${b} = ${a - b}`;
    }

    function multiply() {
        let { a, b } = getValues();
        document.getElementById("result").innerText = `${a} × ${b} = ${a * b}`;
    }

    function divide() {
        let { a, b } = getValues();

        if (b === 0) {
            document.getElementById("result").innerText = "Cannot divide by zero";
            return;
        }

        document.getElementById("result").innerText = `${a} ÷ ${b} = ${a / b}`;
    }
</script>

</body>
</html>
